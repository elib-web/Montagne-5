<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6C5CE7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Diario delle Vie</title>
<style>
:root{
  --purple: #6C5CE7;
  --purple-dark: #5843D6;
  --purple-light: #8E7CF2;
  --bg: #F6F5FA;
  --bg-card: #FFFFFF;
  --ink: #26263A;
  --ink-dim: #767690;
  --ink-faint: #A6A6BC;
  --line: rgba(38,38,58,0.08);
  --line-strong: rgba(38,38,58,0.14);
  --ice: #2E7182;
  --rust: #D9534F;
  --shadow: 0 10px 26px rgba(60,50,120,0.10);
  --shadow-lg: 0 16px 40px rgba(60,50,120,0.16);
  --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
html,body{ height:100%; }
body{
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  overflow-x:hidden;
  padding-bottom: 78px;
  text-size-adjust: 100%;
  -webkit-text-size-adjust: 100%;
}

/* ================= HEADER ================= */
.header{
  background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
  border-radius: 0 0 28px 28px;
  padding: 18px 20px 20px;
  color: #fff;
  position: relative;
}
.header-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.icon-btn{
  width: 40px; height:40px; border-radius: 12px; flex-shrink:0;
  background: rgba(255,255,255,0.18);
  border:none; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:#fff;
}
.icon-btn:hover{ background: rgba(255,255,255,0.28); }
.icon-btn.on{ background:#fff; color: var(--purple); }
.icon-btn svg{ width:19px; height:19px; }
.header-titles{ text-align:right; flex:1; }
.page-title{ font-family: var(--font-display); font-weight:700; font-size:22px; }
.page-sub{ font-size:12px; color: rgba(255,255,255,0.75); font-style:italic; margin-top:2px; }
.header-actions{ display:flex; gap:8px; }

.search-wrap{ overflow:hidden; max-height:0; transition: max-height 0.22s ease, margin-top 0.22s ease; margin-top:0; }
.search-wrap.open{ max-height:70px; margin-top:14px; }
.search-bar{
  display:flex; align-items:center; gap:8px;
  background:#fff; border-radius: 14px; padding: 10px 14px;
  box-shadow: var(--shadow);
}
.search-bar svg{ width:17px; height:17px; color: var(--ink-faint); flex-shrink:0; }
.search-bar input{
  border:none; outline:none; font-family: var(--font-body); font-size:16px;
  color: var(--ink); width:100%; background:transparent;
}
.search-bar input::placeholder{ color: var(--ink-faint); }

/* ================= CONTENT ================= */
.content{ padding: 18px 18px 10px; max-width: 640px; margin:0 auto; }

/* ================= BIG CATEGORY TILES ================= */
.big-tiles{ display:grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 6px; }
.big-tile{
  display:flex; flex-direction:column; align-items:center; gap:10px;
  padding: 22px 10px; border-radius: 20px; cursor:pointer; border: 2.5px solid transparent;
  background: var(--bg-card); box-shadow: 0 1px 4px rgba(60,50,120,0.06);
  transition: transform 0.1s ease;
}
.big-tile:active{ transform: scale(0.97); }
.big-tile.active{ border-color: var(--purple); background: #F1EDFD; }
.big-tile-icon{
  width:64px; height:64px; border-radius:18px; display:flex; align-items:center; justify-content:center;
}
.big-tile-icon svg{ width:32px; height:32px; }
.big-tile-label{ font-family: var(--font-display); font-weight:600; font-size: 13.5px; color: var(--ink); text-align:center; line-height:1.25; }

/* ================= FILTER ROW (zona + clienti + backup) ================= */
.subfilters{ display:flex; gap:8px; flex-wrap:wrap; margin: 16px 0 4px; align-items:center; }
.zone-btn{
  display:flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size:12.5px;
  color: var(--ink-dim); cursor:pointer; user-select:none; padding: 8px 13px;
  border:1px solid var(--line-strong); border-radius: 10px; background: var(--bg-card);
}
.zone-btn.active{ border-color: var(--purple); color: var(--purple); background:#F1EDFD; }
.zone-btn svg{ width:14px; height:14px; }
.chip-toggle{
  display:flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size:12px;
  color: var(--ink-dim); cursor:pointer; user-select:none; padding: 8px 12px;
  border:1px solid var(--line-strong); border-radius: 10px; background: var(--bg-card);
}
.chip-toggle.active{ border-color: var(--purple); color: var(--purple); background: #EFEBFD; }
.chip-toggle input{ display:none; }
.text-link-btn{
  font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-dim);
  background:none; border:none; cursor:pointer; text-decoration:underline; padding: 8px 4px;
}

/* ================= CARDS ================= */
.stats{
  display:flex; gap: 18px; flex-wrap: wrap;
  font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-dim);
  margin: 16px 0 10px;
}
.stats b{ color: var(--purple); font-size: 16px; display:block; font-family: var(--font-display); }

.grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top:12px; }
.card{
  background: var(--bg-card); border: 1px solid var(--line); border-radius: 16px;
  padding: 15px; cursor:pointer; position: relative; overflow:hidden;
  box-shadow: 0 1px 3px rgba(60,50,120,0.05); transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.card:hover{ transform: translateY(-2px); box-shadow: var(--shadow); }
.card .flag{
  position:absolute; top:0; right:0; background: var(--ice); color:#fff;
  font-family: var(--font-mono); font-size: 9.5px; font-weight:600;
  padding: 3px 9px 3px 12px; border-bottom-left-radius: 10px; letter-spacing: 0.03em;
}
.card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px;}
.card h3{ font-family: var(--font-display); font-size: 16px; font-weight:600; line-height:1.25; }
.grado{
  font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--purple-dark);
  background: #EFEBFD; padding: 2px 8px; border-radius: 8px; white-space:nowrap;
}
.meta-row{
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim);
  display:flex; gap:9px; flex-wrap:wrap; margin-bottom:6px;
}
.tipo-badge{ text-transform: uppercase; letter-spacing:0.04em; color: var(--ice); }
.thumb-strip{ display:flex; gap:5px; margin-top:9px; }
.thumb-strip img{ width:38px; height:38px; object-fit:cover; border-radius:8px; }
.card-note{
  font-size:12.5px; color: var(--ink-dim); font-style:italic; margin-top:7px; line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

.empty{
  text-align:center; padding: 44px 20px; color: var(--ink-dim);
  border: 1px dashed var(--line-strong); border-radius: 16px; margin-top:14px;
}
.empty b{ color: var(--purple); font-family: var(--font-display); display:block; font-size:16px; margin-bottom:6px;}

/* ================= BOTTOM NAV ================= */
.bottom-nav{
  position: fixed; bottom:0; left:0; right:0; z-index: 30;
  background: #fff; border-top: 1px solid var(--line);
  display:flex; justify-content:space-around; align-items:center;
  padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
}
.nav-btn{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; cursor:pointer; padding: 6px 26px; border-radius: 12px;
  color: var(--ink-faint);
}
.nav-btn.active{ color: var(--purple); background: #F1EDFD; }
.nav-icon{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
.nav-btn.active .nav-icon{ background: var(--purple); color:#fff; }
.nav-btn svg{ width:18px; height:18px; }
.nav-label{ font-family: var(--font-mono); font-size:9.5px; letter-spacing:0.02em; }

/* ================= PAGER ================= */
.pager{ display:flex; overflow-x:auto; scroll-snap-type: x mandatory; width:100vw; -webkit-overflow-scrolling: touch; }
.pager::-webkit-scrollbar{ display:none; }
.page{ flex: 0 0 100vw; scroll-snap-align: start; min-height: 100vh; }

/* ================= MODAL ================= */
.overlay{
  position: fixed; inset:0; background: rgba(38,38,58,0.35);
  display:none; align-items:flex-start; justify-content:center;
  padding: 26px 14px 100px; z-index: 50; overflow-y:auto;
}
.overlay.show{ display:flex; }
.modal{
  background: #fff; border-radius: 20px;
  max-width: 580px; width:100%; padding: 22px; box-shadow: var(--shadow-lg);
}
.modal-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 16px; gap: 12px;}
.modal-head h2{ font-family: var(--font-display); font-size:20px; }
.close-x{ background: var(--bg); border:none; color: var(--ink-dim); font-size:20px; cursor:pointer; line-height:1; padding:4px 10px; border-radius:8px;}
.close-x:hover{ color: var(--ink); }

.field{ margin-bottom: 13px; }
.field label{
  display:block; font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing:0.06em; text-transform:uppercase; color: var(--purple-dark); margin-bottom:5px;
}
.field textarea{
  width:100%; background: var(--bg); border:1px solid var(--line-strong);
  color: var(--ink); border-radius:10px; padding:10px; font-family: var(--font-body);
  font-size:16px; resize:vertical; min-height:64px; outline:none;
}
.field textarea:focus{ border-color: var(--purple-light); }
.field input[type=text], .field input[type=date], .field input[type=number], .field select{
  width:100%; border-radius:10px; padding: 9px 12px; font-size:16px;
  border:1px solid var(--line-strong); background: var(--bg); color: var(--ink); font-family: var(--font-body);
}
.field select optgroup{ font-family: var(--font-display); font-style:normal; }
.row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.detail-block{ margin-bottom: 14px; padding-bottom:14px; border-bottom:1px solid var(--line); }
.detail-block:last-of-type{ border-bottom:none; }
.detail-label{ font-family: var(--font-mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--purple-dark); margin-bottom:6px;}
.detail-text{ font-size:14px; line-height:1.55; color:var(--ink); white-space:pre-wrap; }
.client-note{ background: #EAF4F6; border-left:3px solid var(--ice); padding: 10px 14px; border-radius: 0 10px 10px 0;}

.photo-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-top:6px;}
.photo-grid img{ width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; cursor:pointer;}

.actions-row{ display:flex; gap:10px; margin-top: 18px; justify-content:flex-end; flex-wrap:wrap;}
button.primary{
  background: var(--purple); color: #FFF; border: none;
  font-family: var(--font-display); font-weight: 600; font-size: 14px;
  padding: 10px 18px; border-radius: 12px; cursor:pointer; white-space: nowrap;
}
button.primary:hover{ background: var(--purple-dark); }
button.ghost{
  background: var(--bg); border: 1px solid var(--line-strong); color: var(--ink-dim);
  font-family: var(--font-mono); font-size: 12px; padding: 9px 14px; border-radius: 12px; cursor:pointer;
}
button.ghost:hover{ color: var(--ink); }

.photo-upload-zone{
  border: 1.5px dashed var(--line-strong); border-radius:12px; padding: 13px; text-align:center;
  font-family: var(--font-mono); font-size:11.5px; color:var(--ink-dim); cursor:pointer; background: var(--bg);
}
.photo-upload-zone:hover{ border-color: var(--purple-light); color: var(--ink); }
.photo-preview-strip{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.photo-preview{ position:relative; width:58px; height:58px; }
.photo-preview img{ width:100%; height:100%; object-fit:cover; border-radius:8px; }
.photo-preview .rm{
  position:absolute; top:-6px; right:-6px; background:var(--rust); color:#fff; border:none;
  width:18px; height:18px; border-radius:50%; font-size:11px; cursor:pointer; line-height:1;
}
.checkbox-line{ display:flex; align-items:center; gap:8px; font-family: var(--font-mono); font-size:12px; color:var(--ink-dim); }
.checkbox-line input{ width:15px; height:15px; accent-color: var(--purple); }

.toast{
  position:fixed; bottom:86px; left:50%; transform:translateX(-50%);
  background: var(--ink); color:#FFF; font-family: var(--font-mono); font-size:12px;
  padding: 9px 18px; border-radius:10px; box-shadow: var(--shadow); z-index: 100;
  opacity:0; transition: opacity 0.25s ease; pointer-events:none; max-width:85vw; text-align:center;
}
.toast.show{ opacity:1; }

/* ================= ZONE PICKER MODAL ================= */
.zone-list{ display:flex; flex-direction:column; gap:6px; max-height:50vh; overflow-y:auto; }
.zone-item{
  padding:11px 14px; border-radius:10px; background: var(--bg); cursor:pointer;
  font-family: var(--font-body); font-size:14.5px; display:flex; justify-content:space-between; align-items:center;
}
.zone-item.active{ background:#F1EDFD; color: var(--purple-dark); font-weight:600; }

/* ================= STATS PAGE ================= */
.stat-block{ margin-bottom: 22px; }
.stat-block h4{ font-family: var(--font-display); font-size:13px; margin-bottom:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.03em; }
.bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:7px; }
.bar-label{ font-family: var(--font-mono); font-size:11px; color:var(--ink-dim); width:120px; flex-shrink:0; }
.bar-track{ flex:1; background: var(--line); border-radius:6px; height:9px; overflow:hidden; }
.bar-fill{ background: var(--purple-light); height:100%; border-radius:6px; }
.bar-val{ font-family: var(--font-mono); font-size:11px; color:var(--ink); width:24px; text-align:right; }
.big-stats{ display:grid; grid-template-columns: repeat(2,1fr); gap:12px; margin: 16px 0 22px; }
.big-stat{ background: var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:16px; }
.big-stat .num{ font-family: var(--font-display); font-size:26px; font-weight:700; color:var(--purple); }
.big-stat .lbl{ font-family: var(--font-mono); font-size:10.5px; color:var(--ink-dim); margin-top:2px; }
.note-line{ font-family: var(--font-mono); font-size:11.5px; color:var(--ink-dim); margin-top:2px;}

/* ================= CALENDAR ================= */
.cal-toggle{ display:flex; background: var(--bg); border-radius:20px; padding:3px; margin-bottom:14px; }
.cal-tab{ flex:1; text-align:center; padding:8px; border-radius:16px; font-family: var(--font-mono); font-size:12px; color:var(--ink-dim); cursor:pointer; }
.cal-tab.active{ background: var(--purple); color:#fff; }
.cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-nav-btn{ background: var(--bg-card); border:1px solid var(--line); border-radius:10px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-dim); font-size:16px; }
.cal-title{ font-family: var(--font-display); font-weight:700; font-size:15px; }
.cal-year-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.cal-month-title{ font-family: var(--font-display); font-weight:600; font-size:12px; margin-bottom:6px; color:var(--ink-dim); }
.cal-dots{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-dot{ width:100%; aspect-ratio:1; border-radius:50%; background: var(--line); }
.cal-dot.clickable{ cursor:pointer; }
.dot-alp{ background: var(--purple) !important; }
.dot-training{ background: #E0A458 !important; }
.dot-both{ background: #2E9099 !important; }
.cal-month-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal-weekday-hdr{ font-family: var(--font-mono); font-size:10px; color:var(--ink-faint); text-align:center; }
.cal-day-cell{ aspect-ratio:1; border-radius:10px; background: var(--bg-card); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; font-family: var(--font-mono); font-size:11px; color:var(--ink-dim); gap:3px; }
.cal-day-cell.empty{ background:transparent; border:none; }
.cal-day-cell.clickable{ cursor:pointer; }
.cal-week-row{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; background: var(--bg-card); border:1px solid var(--line); margin-bottom:8px; }
.cal-week-row.clickable{ cursor:pointer; }
.cal-week-date{ font-family: var(--font-mono); font-size:12px; color:var(--ink-dim); width:60px; flex-shrink:0; }
.cal-week-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; background: var(--line); }
.cal-week-label{ font-family: var(--font-body); font-size:13.5px; color:var(--ink); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cal-legend{ display:flex; gap:14px; margin-top:14px; font-family: var(--font-mono); font-size:11px; color:var(--ink-dim); flex-wrap:wrap; }
.legend-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px; vertical-align:middle; }

::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-thumb{ background: var(--line-strong); border-radius:4px; }

@media (max-width:420px){
  .row2, .row3{ grid-template-columns: 1fr; }
  .big-tile-label{ font-size:12.5px; }
}
</style>
</head>
<body>

<div class="pager" id="pager">

  <!-- PAGE 0: ATTIVITÀ -->
  <div class="page">
    <div class="header">
      <div class="header-top">
        <div style="display:flex; gap:6px;">
          <button class="icon-btn" id="plusBtn" title="Nuova attività">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="icon-btn" id="backupIconBtn" title="Esporta backup">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L12 14 M7 10 L12 15 L17 10"/><path d="M4 19 L20 19"/></svg>
          </button>
          <button class="icon-btn" id="importIconBtn" title="Importa backup">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15 L12 4 M7 9 L12 4 L17 9"/><path d="M4 19 L20 19"/></svg>
          </button>
        </div>
        <div class="header-titles">
          <div class="page-title">Attività</div>
          <div class="page-sub">Vie, uscite e allenamenti</div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="searchToggle" title="Cerca">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>
      <div class="search-wrap" id="searchWrap">
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cerca — nome, zona, grado...">
        </div>
      </div>
    </div>

    <div class="content">
      <div class="big-tiles" id="bigTiles"></div>

      <div class="subfilters">
        <button class="zone-btn" id="zoneBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21 C7 16 4 12.5 4 9 a8 8 0 0 1 16 0 c0 3.5 -3 7 -8 12 Z"/><circle cx="12" cy="9" r="2.4"/></svg>
          <span id="zoneBtnLabel">Zona</span>
        </button>
        <label class="chip-toggle" id="clienteChipLabel"><input type="checkbox" id="filterCliente"> Solo per clienti</label>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>

      <div class="stats" id="statsStrip"></div>
      <div id="gridWrap"></div>
    </div>
  </div>

  <!-- PAGE 1: STATISTICHE -->
  <div class="page">
    <div class="header">
      <div class="header-top">
        <div style="width:40px;"></div>
        <div class="header-titles">
          <div class="page-title">Statistiche</div>
          <div class="page-sub">Uno sguardo d'insieme</div>
        </div>
        <div style="width:40px;"></div>
      </div>
    </div>
    <div class="content">
      <div id="calendarWrap"></div>
      <div id="statsPageContent"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" data-page="0">
    <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20 L9 8 L13 15 L16 10 L21 20 Z"/></svg></div>
    <div class="nav-label">ATTIVITÀ</div>

<!-- MODALS -->
<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal"></div></div>
<div class="overlay" id="formOverlay"><div class="modal" id="formModal"></div></div>
<div class="overlay" id="zoneOverlay"><div class="modal" id="zoneModal"></div></div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   TIPO DEFINITIONS
============================================================ */
const ALPINISTIC = ['scialpinismo','alpinismo','multitiri','ghiaccio','falesia','sci_alpino','misto','drytooling','freeride'];
const TRAINING = ['dita_trave','forza','resistenza','palestra','boulder','corsa','bici'];
const TIPO_LABELS = {
  scialpinismo:'Scialpinismo', alpinismo:'Alpinismo', multitiri:'Multitiri', ghiaccio:'Cascata di ghiaccio',
  falesia:'Falesia', sci_alpino:'Sci alpino', misto:'Misto', drytooling:'Drytooling', freeride:'Freeride',
  dita_trave:'Dita - trave', forza:'Forza', resistenza:'Resistenza', palestra:'Arrampicata palestra',
  boulder:'Boulder', corsa:'Corsa', bici:'Bici'
};
function tipoLabel(t){ return TIPO_LABELS[t] || t || '—'; }
function categoryOf(tipo){ return TRAINING.includes(tipo) ? 'allenamento' : 'alpinistica'; }

const ICON_ALPINISTICA = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M2 19 L9 7 L12.5 13 L15 9 L22 19 Z"/></svg>';
const ICON_ALLENAMENTO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12 L21 12 M5 8 L5 16 M19 8 L19 16 M2 10 L2 14 M22 10 L22 14"/></svg>';

/* ============================================================
   HELPERS
============================================================ */
function uid(){ return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}
function fmtDate(d){
  if(!d) return '—';
  const p = d.split('-');
  if(p.length!==3) return d;
  return `${p[2]}.${p[1]}.${p[0]}`;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function compressPhoto(file, cb){
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (ev) => {
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 700;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   NAVIGATION (pager + bottom nav)
============================================================ */
const pager = document.getElementById('pager');
const navBtns = document.querySelectorAll('.nav-btn');
navBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const idx = parseInt(btn.dataset.page);
    pager.scrollTo({ left: idx * window.innerWidth, behavior:'smooth' });
  });
});
pager.addEventListener('scroll', ()=>{
  const idx = Math.round(pager.scrollLeft / window.innerWidth);
  navBtns.forEach((b,i)=> b.classList.toggle('active', i===idx));
  if(idx===1){ renderStatsPage(); renderCalendar(); }
});

/* ============================================================
   SEARCH TOGGLE
============================================================ */
const searchWrap = document.getElementById('searchWrap');
const searchToggle = document.getElementById('searchToggle');
searchToggle.addEventListener('click', ()=>{
  const willOpen = !searchWrap.classList.contains('open');
  searchWrap.classList.toggle('open', willOpen);
  searchToggle.classList.toggle('on', willOpen);
  if(willOpen){ setTimeout(()=>document.getElementById('searchInput').focus(), 200); }
  else { document.getElementById('searchInput').value=''; render(); }
});

/* ============================================================
   STATE + STORAGE (with migration from legacy v2/v3 keys)
============================================================ */
let items = [];
let editingId = null;
let pendingPhotos = [];
let activeCategory = ''; // '' | 'alpinistica' | 'allenamento'
let activeZona = '';
const STORAGE_KEY = 'attivita-diario';
const LEGACY_VIE_KEY = 'vie-diario';
const LEGACY_ALL_KEY = 'allenamenti-diario';

function migrateLegacyData(){
  try{
    const legacyVieRaw = localStorage.getItem(LEGACY_VIE_KEY);
    const legacyAllRaw = localStorage.getItem(LEGACY_ALL_KEY);
    if(!legacyVieRaw && !legacyAllRaw) return [];
    let migrated = [];
    if(legacyVieRaw){
      const legacyVie = JSON.parse(legacyVieRaw);
      migrated = migrated.concat(legacyVie.map(r => ({
        id: r.id || uid(),
        nome: r.nome || '',
        zona: r.zona || '',
        grado: r.grado || '',
        tipo: r.tipo === 'multipitch' ? 'multitiri' : (r.tipo === 'trekking' ? 'misto' : (r.tipo || 'falesia')),
        data: r.data || '',
        conChi: '',
        dislivello: r.dislivello || '',
        tempoImpiegato: '',
        perClienti: !!r.perClienti,
        commentoTecnico: r.noteClienti || '',
        commentoPersonale: r.noteRicordo || '',
        foto: r.foto || []
      })));
    }
    if(legacyAllRaw){
      const legacyAll = JSON.parse(legacyAllRaw);
      const map = {dita:'dita_trave', forza:'forza', resistenza:'resistenza', tecnica:'palestra', falesia:'palestra', corsa:'corsa', altro:'bici'};
      migrated = migrated.concat(legacyAll.map(t => ({
        id: t.id || uid(),
        nome: tipoLabel(map[t.tipo] || 'palestra'),
        zona: '',
        grado: '',
        tipo: map[t.tipo] || 'palestra',
        data: t.data || '',
        conChi: '',
        dislivello: '',
        tempoImpiegato: t.durata ? (t.durata + ' min') : '',
        perClienti: false,
        commentoTecnico: '',
        commentoPersonale: t.note || '',
        foto: []
      })));
    }
    return migrated;
  }catch(e){ return []; }
}

async function loadItems(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      items = JSON.parse(raw);
    }else{
      const migrated = migrateLegacyData();
      items = migrated;
      if(migrated.length) { await saveItems(); showToast('Dati precedenti importati automaticamente'); }
    }
  }catch(e){ items = []; }
  render();
  maybeNudgeBackup();
}
async function saveItems(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
  catch(e){ showToast('Spazio esaurito — esporta un backup e libera spazio'); }
}
function maybeNudgeBackup(){
  if(items.length === 0) return;
  const last = localStorage.getItem(STORAGE_KEY + ':lastBackupNudge');
  const now = Date.now();
  if(!last || (now - parseInt(last)) > 14*24*60*60*1000){
    localStorage.setItem(STORAGE_KEY + ':lastBackupNudge', String(now));
    setTimeout(()=> showToast('Promemoria: esporta un backup ogni tanto'), 900);
  }
}

/* ============================================================
   BIG CATEGORY TILES
============================================================ */
function renderBigTiles(){
  const wrap = document.getElementById('bigTiles');
  wrap.innerHTML = `
    <div class="big-tile ${activeCategory==='alpinistica'?'active':''}" data-cat="alpinistica">
      <div class="big-tile-icon" style="background:#EDEBFB; color:#6C5CE7;">${ICON_ALPINISTICA}</div>
      <div class="big-tile-label">Attività alpinistiche</div>
    </div>
    <div class="big-tile ${activeCategory==='allenamento'?'active':''}" data-cat="allenamento">
      <div class="big-tile-icon" style="background:#FDEEDC; color:#E07B39;">${ICON_ALLENAMENTO}</div>
      <div class="big-tile-label">Allenamenti</div>
    </div>`;
  wrap.querySelectorAll('.big-tile').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cat = el.dataset.cat;
      activeCategory = (activeCategory === cat) ? '' : cat;
      renderBigTiles();
      render();
    });
  });
}

/* ============================================================
   ZONE PICKER
============================================================ */
document.getElementById('zoneBtn').addEventListener('click', openZonePicker);
function openZonePicker(){
  const zone = [...new Set(items.map(i=>i.zona).filter(Boolean))].sort();
  const modal = document.getElementById('zoneModal');
  modal.innerHTML = `
    <div class="modal-head"><h2>Scegli zona</h2><button class="close-x" id="closeZone">×</button></div>
    <div class="zone-list">
      <div class="zone-item ${activeZona===''?'active':''}" data-zona="">Tutte le zone</div>
      ${zone.map(z=>`<div class="zone-item ${activeZona===z?'active':''}" data-zona="${escapeHtml(z)}">${escapeHtml(z)}</div>`).join('') || '<div class="page-sub" style="color:var(--ink-dim); font-style:italic;">Nessuna zona registrata ancora.</div>'}
    </div>`;
  document.getElementById('closeZone').onclick = ()=> document.getElementById('zoneOverlay').classList.remove('show');
  modal.querySelectorAll('.zone-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeZona = el.dataset.zona;
      document.getElementById('zoneOverlay').classList.remove('show');
      updateZoneBtnLabel();
      render();
    });
  });
  document.getElementById('zoneOverlay').classList.add('show');
}
function updateZoneBtnLabel(){
  const btn = document.getElementById('zoneBtn');
  const lbl = document.getElementById('zoneBtnLabel');
  lbl.textContent = activeZona || 'Zona';
  btn.classList.toggle('active', !!activeZona);
}

/* ============================================================
   RENDER LIST
============================================================ */
function renderStatsStrip(){
  const n = items.length;
  const clientReady = items.filter(i=>i.perClienti).length;
  const zone = new Set(items.map(i=>i.zona).filter(Boolean)).size;
  document.getElementById('statsStrip').innerHTML = `
    <div><b>${n}</b>attività registrate</div>
    <div><b>${clientReady}</b>pronte per clienti</div>
    <div><b>${zone}</b>zone diverse</div>`;
}
function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const soloClienti = document.getElementById('filterCliente').checked;
  return items
    .filter(i => !q || (i.nome+' '+i.zona+' '+i.grado+' '+tipoLabel(i.tipo)).toLowerCase().includes(q))
    .filter(i => !activeCategory || categoryOf(i.tipo)===activeCategory)
    .filter(i => !activeZona || i.zona===activeZona)
    .filter(i => !soloClienti || i.perClienti)
    .sort((a,b) => (b.data||'').localeCompare(a.data||''));
}
function render(){
  renderStatsStrip();
  const wrap = document.getElementById('gridWrap');
  const list = getFiltered();
  if(items.length===0){
    wrap.innerHTML = `<div class="empty"><b>Il diario è vuoto</b>Registra la tua prima attività: una via, un'uscita, o una seduta di allenamento.</div>`;
    return;
  }
  if(list.length===0){
    wrap.innerHTML = `<div class="empty"><b>Nessun risultato</b>Prova a cambiare i filtri.</div>`;
    return;
  }
  wrap.innerHTML = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
  wrap.querySelectorAll('.card').forEach(el=> el.addEventListener('click', ()=> openDetail(el.dataset.id)));
}
function cardHtml(i){
  const thumbs = (i.foto||[]).slice(0,4).map(p=>`<img src="${p}">`).join('');
  const note = i.commentoTecnico || i.commentoPersonale || '';
  return `
  <div class="card" data-id="${i.id}">
    ${i.perClienti ? '<div class="flag">CLIENTI</div>' : ''}
    <div class="card-top">
      <h3>${escapeHtml(i.nome||tipoLabel(i.tipo))}</h3>
      ${i.grado ? `<span class="grado">${escapeHtml(i.grado)}</span>` : ''}
    </div>
    <div class="meta-row">
      <span class="tipo-badge">${tipoLabel(i.tipo)}</span>
      ${i.montagna ? `<span>${escapeHtml(i.montagna)}</span>` : ''}
      ${i.zona ? `<span>${escapeHtml(i.zona)}</span>` : ''}
      <span>${fmtDate(i.data)}</span>
    </div>
    ${note ? `<div class="card-note">${escapeHtml(note)}</div>` : ''}
    ${thumbs ? `<div class="thumb-strip">${thumbs}</div>` : ''}
  </div>`;
}

/* ============================================================
   DETAIL MODAL
============================================================ */
function openDetail(id){
  const i = items.find(x=>x.id===id);
  if(!i) return;
  const modal = document.getElementById('detailModal');
  modal.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>${escapeHtml(i.nome||tipoLabel(i.tipo))}</h2>
        <div class="meta-row" style="margin-top:6px;">
          ${i.grado ? `<span class="grado">${escapeHtml(i.grado)}</span>` : ''}
          <span class="tipo-badge">${tipoLabel(i.tipo)}</span>
          ${i.montagna ? `<span>${escapeHtml(i.montagna)}</span>` : ''}
          ${i.zona ? `<span>${escapeHtml(i.zona)}</span>` : ''}
          <span>${fmtDate(i.data)}</span>
        </div>
      </div>
      <button class="close-x" id="closeDetail">×</button>
    </div>
    <div class="meta-row" style="margin-bottom:14px;">
      ${i.conChi ? `<span>Con: ${escapeHtml(i.conChi)}</span>` : ''}
      ${i.dislivello ? `<span>${escapeHtml(i.dislivello)}</span>` : ''}
      ${i.tempoImpiegato ? `<span>${escapeHtml(i.tempoImpiegato)}</span>` : ''}
    </div>
    ${i.perClienti ? `<div class="detail-block client-note"><div class="detail-label">Commento tecnico</div><div class="detail-text">${escapeHtml(i.commentoTecnico || '—')}</div></div>` : (i.commentoTecnico ? `<div class="detail-block"><div class="detail-label">Commento tecnico</div><div class="detail-text">${escapeHtml(i.commentoTecnico)}</div></div>` : '')}
    ${i.commentoPersonale ? `<div class="detail-block"><div class="detail-label">Commento personale</div><div class="detail-text">${escapeHtml(i.commentoPersonale)}</div></div>` : ''}
    ${(i.foto && i.foto.length) ? `<div class="detail-block"><div class="detail-label">Foto</div><div class="photo-grid">${i.foto.map(p=>`<img src="${p}">`).join('')}</div></div>` : ''}
    <div class="actions-row">
      <button class="ghost" id="deleteBtn">Elimina</button>
      <button class="primary" id="editBtn">Modifica</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('show');
  document.getElementById('closeDetail').onclick = ()=> document.getElementById('detailOverlay').classList.remove('show');
  document.getElementById('deleteBtn').onclick = () => deleteItem(i.id);
  document.getElementById('editBtn').onclick = () => { document.getElementById('detailOverlay').classList.remove('show'); openForm(i.id); };
}
async function deleteItem(id){
  if(!confirm('Eliminare questa attività? Non si può annullare.')) return;
  items = items.filter(i=>i.id!==id);
  await saveItems();
  document.getElementById('detailOverlay').classList.remove('show');
  render();
  showToast('Eliminata');
}

/* ============================================================
   FORM (create/edit)
============================================================ */
document.getElementById('plusBtn').onclick = () => openForm(null);

function tipoOptionsHtml(selected){
  const alp = ALPINISTIC.map(t=>`<option value="${t}" ${selected===t?'selected':''}>${tipoLabel(t)}</option>`).join('');
  const tra = TRAINING.map(t=>`<option value="${t}" ${selected===t?'selected':''}>${tipoLabel(t)}</option>`).join('');
  return `<optgroup label="Attività alpinistiche">${alp}</optgroup><optgroup label="Allenamenti">${tra}</optgroup>`;
}

function openForm(id){
  editingId = id || null;
  const i = editingId ? items.find(x=>x.id===editingId) : {};
  pendingPhotos = (i.foto || []).slice();
  const modal = document.getElementById('formModal');
  modal.innerHTML = `
    <div class="modal-head"><h2>${editingId ? 'Modifica attività' : 'Nuova attività'}</h2><button class="close-x" id="closeForm">×</button></div>
    <div class="field"><label>Nome via / attività</label><input type="text" id="f_nome" value="${escapeHtml(i.nome||'')}" placeholder="Es. Via degli Svizzeri"></div>
    <div class="row2">
      <div class="field"><label>Nome montagna</label><input type="text" id="f_montagna" value="${escapeHtml(i.montagna||'')}" placeholder="Es. Eiger, Bietschhorn..."></div>
      <div class="field"><label>Zona / Settore</label><input type="text" id="f_zona" value="${escapeHtml(i.zona||'')}" placeholder="Es. Gimmelwald"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Grado</label><input type="text" id="f_grado" value="${escapeHtml(i.grado||'')}" placeholder="Es. 6a+, PD+, AD"></div>
      <div class="field"><label>Tipo</label><select id="f_tipo">${tipoOptionsHtml(i.tipo||'falesia')}</select></div>
    </div>
    <div class="field"><label>Data</label><input type="date" id="f_data" value="${i.data||''}"></div>
    <div class="row2">
      <div class="field"><label>Con chi</label><input type="text" id="f_conChi" value="${escapeHtml(i.conChi||'')}" placeholder="Es. Marco, un cliente..."></div>
      <div class="field"><label>Dislivello / lunghezza</label><input type="text" id="f_dislivello" value="${escapeHtml(i.dislivello||'')}" placeholder="Es. 600m, 8 tiri"></div>
    </div>
    <div class="field"><label>Tempo impiegato</label><input type="text" id="f_tempo" value="${escapeHtml(i.tempoImpiegato||'')}" placeholder="Es. 4h30, mezza giornata"></div>
    <div class="field"><label class="checkbox-line"><input type="checkbox" id="f_perClienti" ${i.perClienti?'checked':''}> Adatta per clienti</label></div>
    <div class="field"><label>Commento tecnico</label><textarea id="f_commentoTecnico" placeholder="Accesso, soste, pericoli, materiale, condizioni...">${escapeHtml(i.commentoTecnico||'')}</textarea></div>
    <div class="field"><label>Commento personale</label><textarea id="f_commentoPersonale" placeholder="Sensazioni, ricordi, chi c'era...">${escapeHtml(i.commentoPersonale||'')}</textarea></div>
    <div class="field">
      <label>Foto</label>
      <div class="photo-upload-zone" id="uploadZone">Clicca per aggiungere foto (max 6)</div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
      <div class="photo-preview-strip" id="previewStrip"></div>
    </div>
    <div class="actions-row"><button class="ghost" id="cancelForm">Annulla</button><button class="primary" id="saveForm">Salva</button></div>`;
  renderPreviewStrip();
  document.getElementById('closeForm').onclick = closeForm;
  document.getElementById('cancelForm').onclick = closeForm;
  document.getElementById('uploadZone').onclick = () => document.getElementById('photoInput').click();
  document.getElementById('photoInput').onchange = handlePhotoInput;
  document.getElementById('saveForm').onclick = submitForm;
  document.getElementById('formOverlay').classList.add('show');
}
function closeForm(){ document.getElementById('formOverlay').classList.remove('show'); editingId=null; pendingPhotos=[]; }
function renderPreviewStrip(){
  const strip = document.getElementById('previewStrip');
  strip.innerHTML = pendingPhotos.map((p,idx)=>`<div class="photo-preview"><img src="${p}"><button class="rm" data-idx="${idx}">×</button></div>`).join('');
  strip.querySelectorAll('.rm').forEach(btn=>{ btn.onclick = () => { pendingPhotos.splice(parseInt(btn.dataset.idx),1); renderPreviewStrip(); }; });
}
function handlePhotoInput(e){
  const files = Array.from(e.target.files).slice(0, 6 - pendingPhotos.length);
  files.forEach(file => compressPhoto(file, dataUrl => { pendingPhotos.push(dataUrl); renderPreviewStrip(); }));
  e.target.value = '';
}
async function submitForm(){
  const nome = document.getElementById('f_nome').value.trim();
  const data = {
    id: editingId || uid(),
    nome,
    montagna: document.getElementById('f_montagna').value.trim(),
    zona: document.getElementById('f_zona').value.trim(),
    grado: document.getElementById('f_grado').value.trim(),
    tipo: document.getElementById('f_tipo').value,
    data: document.getElementById('f_data').value,
    conChi: document.getElementById('f_conChi').value.trim(),
    dislivello: document.getElementById('f_dislivello').value.trim(),
    tempoImpiegato: document.getElementById('f_tempo').value.trim(),
    perClienti: document.getElementById('f_perClienti').checked,
    commentoTecnico: document.getElementById('f_commentoTecnico').value.trim(),
    commentoPersonale: document.getElementById('f_commentoPersonale').value.trim(),
    foto: pendingPhotos.slice()
  };
  if(editingId){ items = items.map(x => x.id===editingId ? data : x); } else { items.push(data); }
  await saveItems();
  closeForm();
  render();
  showToast('Attività salvata');
}

/* ============================================================
   BACKUP EXPORT / IMPORT
============================================================ */
function exportBackup(){
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `diario_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup scaricato — controlla i Download del telefono');
}
function importBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try{
      const imported = JSON.parse(ev.target.result);
      const arr = Array.isArray(imported) ? imported : (imported.vie || []).concat(imported.allenamenti || []);
      const existingIds = new Set(items.map(i=>i.id));
      items = items.concat(arr.filter(i=>!existingIds.has(i.id)));
      await saveItems();
      render();
      showToast('Backup importato');
    }catch(err){ showToast('File non valido'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
document.getElementById('backupIconBtn').onclick = exportBackup;
document.getElementById('importIconBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = importBackup;

/* ============================================================
   STATISTICHE
============================================================ */
function renderStatsPage(){
  const totItems = items.length;
  const totAlp = items.filter(i=>categoryOf(i.tipo)==='alpinistica').length;
  const totAll = items.filter(i=>categoryOf(i.tipo)==='allenamento').length;
  const zoneUniche = new Set(items.map(i=>i.zona).filter(Boolean)).size;

  const perTipo = {};
  items.forEach(i=>{ const k = i.tipo || 'altro'; perTipo[k] = (perTipo[k]||0)+1; });
  const maxTipo = Math.max(1, ...Object.values(perTipo));

  const gradiCount = {};
  items.forEach(i=>{ if(i.grado) gradiCount[i.grado] = (gradiCount[i.grado]||0)+1; });
  const topGradi = Object.entries(gradiCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxGrado = Math.max(1, ...topGradi.map(g=>g[1]));

  document.getElementById('statsPageContent').innerHTML = `
    <div class="big-stats">
      <div class="big-stat"><div class="num">${totItems}</div><div class="lbl">Attività totali</div></div>
      <div class="big-stat"><div class="num">${totAlp}</div><div class="lbl">Alpinistiche</div></div>
      <div class="big-stat"><div class="num">${totAll}</div><div class="lbl">Allenamenti</div></div>
      <div class="big-stat"><div class="num">${zoneUniche}</div><div class="lbl">Zone diverse</div></div>
    </div>
    <div class="stat-block">
      <h4>Attività per tipo</h4>
      ${Object.entries(perTipo).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
        <div class="bar-row"><div class="bar-label">${tipoLabel(k)}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxTipo*100)}%"></div></div><div class="bar-val">${v}</div></div>`).join('') || '<div class="note-line">Nessun dato ancora.</div>'}
    </div>
    <div class="stat-block">
      <h4>Gradi più ricorrenti</h4>
      ${topGradi.map(([k,v])=>`
        <div class="bar-row"><div class="bar-label">${escapeHtml(k)}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxGrado*100)}%"></div></div><div class="bar-val">${v}</div></div>`).join('') || '<div class="note-line">Nessun dato ancora.</div>'}
    </div>
  `;
}

/* ============================================================
   CALENDARIO ATTIVITÀ
============================================================ */
let calMode = 'anno'; // 'settimana' | 'mese' | 'anno'
let calRefDate = new Date();
const MONTH_NAMES = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const MONTH_NAMES_SHORT = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const DAY_NAMES = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const WEEKDAY_HDRS = ['L','M','M','G','V','S','D'];

function toKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function startOfWeek(d){
  const day = (d.getDay()+6)%7;
  const r = new Date(d); r.setDate(d.getDate()-day); r.setHours(0,0,0,0);
  return r;
}
function buildActivityMap(){
  const map = {};
  items.forEach(i=>{
    if(!i.data) return;
    const cat = categoryOf(i.tipo);
    if(!map[i.data]) map[i.data] = {alp:false, training:false, names:[]};
    if(cat==='alpinistica') map[i.data].alp = true; else map[i.data].training = true;
    map[i.data].names.push(i.nome || tipoLabel(i.tipo));
  });
  return map;
}
function dotClassFor(entry){
  if(!entry) return '';
  if(entry.alp && entry.training) return 'dot-both';
  if(entry.alp) return 'dot-alp';
  return 'dot-training';
}
function navRowHtml(label){
  return `<div class="cal-nav">
    <button class="cal-nav-btn" data-dir="-1">‹</button>
    <div class="cal-title">${label}</div>
    <button class="cal-nav-btn" data-dir="1">›</button>
  </div>`;
}
function renderMiniMonth(year, month, map){
  const daysInMonth = new Date(year, month+1, 0).getDate();
  let dots = '';
  for(let d=1; d<=daysInMonth; d++){
    const key = toKey(new Date(year, month, d));
    const entry = map[key];
    dots += `<div class="cal-dot ${dotClassFor(entry)} ${entry?'clickable':''}" ${entry?`data-daykey="${key}"`:''}></div>`;
  }
  return `<div><div class="cal-month-title">${MONTH_NAMES_SHORT[month]}</div><div class="cal-dots">${dots}</div></div>`;
}
function renderFullMonth(year, month, map){
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDow = (new Date(year, month, 1).getDay()+6)%7;
  let html = `<div class="cal-month-grid">`;
  WEEKDAY_HDRS.forEach(w=> html += `<div class="cal-weekday-hdr">${w}</div>`);
  for(let i=0;i<firstDow;i++) html += `<div class="cal-day-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = toKey(new Date(year, month, d));
    const entry = map[key];
    html += `<div class="cal-day-cell ${entry?'clickable':''}" ${entry?`data-daykey="${key}"`:''}>
      <span>${d}</span>
      ${entry?`<span class="cal-dot ${dotClassFor(entry)}" style="width:7px;height:7px;"></span>`:''}
    </div>`;
  }
  html += `</div>`;
  return html;
}
function weekRangeLabel(start){
  const end = new Date(start); end.setDate(start.getDate()+6);
  return `${start.getDate()} ${MONTH_NAMES_SHORT[start.getMonth()]} – ${end.getDate()} ${MONTH_NAMES_SHORT[end.getMonth()]}`;
}
function renderWeek(start, map){
  let html = '';
  for(let i=0;i<7;i++){
    const dt = new Date(start); dt.setDate(start.getDate()+i);
    const key = toKey(dt);
    const entry = map[key];
    const label = entry ? entry.names.slice(0,2).join(', ') + (entry.names.length>2?` +${entry.names.length-2}`:'') : 'Nessuna attività';
    html += `<div class="cal-week-row ${entry?'clickable':''}" ${entry?`data-daykey="${key}"`:''}>
      <div class="cal-week-date">${DAY_NAMES[i]} ${dt.getDate()}</div>
      <div class="cal-week-dot ${dotClassFor(entry)}"></div>
      <div class="cal-week-label">${escapeHtml(label)}</div>
    </div>`;
  }
  return html;
}
function renderCalendar(){
  const wrap = document.getElementById('calendarWrap');
  if(!wrap) return;
  const map = buildActivityMap();
  let html = `<div class="section-label" style="margin-top:0;">Calendario attività</div>
    <div class="cal-toggle">
      <div class="cal-tab ${calMode==='settimana'?'active':''}" data-mode="settimana">Settimana</div>
      <div class="cal-tab ${calMode==='mese'?'active':''}" data-mode="mese">Mese</div>
      <div class="cal-tab ${calMode==='anno'?'active':''}" data-mode="anno">Anno</div>
    </div>`;

  if(calMode === 'anno'){
    const year = calRefDate.getFullYear();
    html += navRowHtml(`${year}`);
    html += `<div class="cal-year-grid">`;
    for(let m=0;m<12;m++) html += renderMiniMonth(year, m, map);
    html += `</div>`;
  } else if(calMode === 'mese'){
    const year = calRefDate.getFullYear(), month = calRefDate.getMonth();
    html += navRowHtml(`${MONTH_NAMES[month]} ${year}`);
    html += renderFullMonth(year, month, map);
  } else {
    const start = startOfWeek(calRefDate);
    html += navRowHtml(weekRangeLabel(start));
    html += renderWeek(start, map);
  }

  html += `<div class="cal-legend">
      <span><span class="legend-dot" style="background:var(--purple);"></span>Attività alpinistica</span>
      <span><span class="legend-dot" style="background:#E0A458;"></span>Allenamento</span>
      <span><span class="legend-dot" style="background:#2E9099;"></span>Entrambi</span>
    </div>`;

  wrap.innerHTML = html;

  wrap.querySelectorAll('.cal-tab').forEach(el=>{
    el.addEventListener('click', ()=>{ calMode = el.dataset.mode; renderCalendar(); });
  });
  wrap.querySelectorAll('.cal-nav-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      const dir = parseInt(el.dataset.dir);
      if(calMode==='anno') calRefDate.setFullYear(calRefDate.getFullYear()+dir);
      else if(calMode==='mese') calRefDate.setMonth(calRefDate.getMonth()+dir);
      else calRefDate.setDate(calRefDate.getDate()+dir*7);
      renderCalendar();
    });
  });
  wrap.querySelectorAll('[data-daykey]').forEach(el=>{
    el.addEventListener('click', ()=> openDayList(el.dataset.daykey));
  });
}
function openDayList(key){
  const dayItems = items.filter(i=>i.data===key);
  if(!dayItems.length) return;
  const modal = document.getElementById('zoneModal');
  modal.innerHTML = `
    <div class="modal-head"><h2>${fmtDate(key)}</h2><button class="close-x" id="closeDayList">×</button></div>
    <div class="zone-list">
      ${dayItems.map(i=>`<div class="zone-item" data-id="${i.id}">${escapeHtml(i.nome||tipoLabel(i.tipo))} — <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-dim);">${tipoLabel(i.tipo)}</span></div>`).join('')}
    </div>`;
  document.getElementById('closeDayList').onclick = ()=> document.getElementById('zoneOverlay').classList.remove('show');
  modal.querySelectorAll('.zone-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.getElementById('zoneOverlay').classList.remove('show');
      openDetail(el.dataset.id);
    });
  });
  document.getElementById('zoneOverlay').classList.add('show');
}

/* ============================================================
   WIRE UP + INIT
============================================================ */
document.getElementById('searchInput').oninput = render;
document.getElementById('filterCliente').onchange = (e) => {
  document.getElementById('clienteChipLabel').classList.toggle('active', e.target.checked);
  render();
};
document.getElementById('detailOverlay').addEventListener('click', (e)=>{ if(e.target.id==='detailOverlay') e.target.classList.remove('show'); });
document.getElementById('formOverlay').addEventListener('click', (e)=>{ if(e.target.id==='formOverlay') closeForm(); });
document.getElementById('zoneOverlay').addEventListener('click', (e)=>{ if(e.target.id==='zoneOverlay') e.target.classList.remove('show'); });

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

(async function init(){
  renderBigTiles();
  updateZoneBtnLabel();
  await loadItems();
  renderStatsPage();
  renderCalendar();
})();
</script>
